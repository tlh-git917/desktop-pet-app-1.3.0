name: Build Desktop Pet Installer

on:
  push:
    branches:
      - main
      - master
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Show tool versions
        shell: bash
        run: |
          node --version
          npm --version

      - name: Install dependencies
        run: npm install

      - name: Run QA checks
        run: npm run check

      - name: Build Windows installer
        run: npm run dist:win

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: desktop-pet-installer-${{ github.ref_name }}
          path: dist/*.exe
          if-no-files-found: error
          retention-days: 14

      - name: Publish installer to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release view "${env:GITHUB_REF_NAME}" *> $null
          if ($LASTEXITCODE -ne 0) {
            gh release create "${env:GITHUB_REF_NAME}" --title "${env:GITHUB_REF_NAME}" --notes "Automated Windows installer build for ${env:GITHUB_REF_NAME}."
          }
          gh release upload "${env:GITHUB_REF_NAME}" dist/*.exe --clobber
